name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/artifacts.yml

  release:
    needs: build
    name: Publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v5
        with:
          name: bundle-cli
          path: cli
      - name: Package binaries and checksums
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p release
          for t in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64 windows-amd64 windows-arm64; do
            if [ "${t%-*}" = windows ]; then
              (cd "cli/$t" && zip -q "$GITHUB_WORKSPACE/release/bundl_${ver}_${t}.zip" bundl.exe)
            else
              chmod +x "cli/$t/bundl"
              tar -C "cli/$t" -czf "release/bundl_${ver}_${t}.tar.gz" bundl
            fi
          done
          (cd release && sha256sum bundl_* > checksums.txt)
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --title "$GITHUB_REF_NAME" --generate-notes
      - name: Bump Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew formula bump." >&2
            exit 0
          fi
          ver="${GITHUB_REF_NAME#v}"
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/moyilmaz6/homebrew-tap.git" tap
          mkdir -p tap/Formula
          rm -f tap/Formula/bundle.rb
          bash packaging/homebrew/generate-formula.sh "$ver" release/checksums.txt > tap/Formula/bundl.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A Formula/
          git diff --cached --quiet && { echo "formula already up to date"; exit 0; }
          git commit -m "bundl ${ver}"
          git push
